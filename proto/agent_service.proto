syntax = "proto3";

package data_protection;

option csharp_namespace = "DataProtection.Grpc";

message AgentMessage {
  string type = 1;
  string payload = 2;
}

message ServerMessage {
  string type = 1;
  string payload = 2;
}

service AgentHub {
  rpc Connect(stream AgentMessage) returns (stream ServerMessage);
}
